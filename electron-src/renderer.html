<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Professor Domino</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="stage">
      <section id="bubble" aria-live="polite">
        <p id="quoteText"></p>
        <img id="paw" alt="" />
      </section>
      <button id="dominoButton" aria-label="Professor Domino">
        <img id="dominoImage" alt="" draggable="false" />
      </button>
      <dialog id="editor">
        <form method="dialog" id="editorForm">
          <header>
            <h1>Quotes</h1>
            <button id="closeEditor" value="cancel" aria-label="Close">x</button>
          </header>
          <div id="quoteList"></div>
          <footer>
            <button type="button" id="addQuote">Add Quote</button>
            <button type="submit" id="saveQuotes">Save</button>
          </footer>
        </form>
      </dialog>
    </main>
    <script src="./renderer.js"></script>
  </body>
</html>
