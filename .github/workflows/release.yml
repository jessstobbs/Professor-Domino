name: Build and Publish Professor Domino

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag, for example v1.0.3"
        required: true
      release_title:
        description: "Release title"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            script: dist:mac
            arch: arm64
            artifact: professor-domino-mac
            installer: Professor-Domino-mac-arm64.dmg
          - os: windows-latest
            script: dist:win
            arch: x64
            artifact: professor-domino-windows
            installer: Professor-Domino-win-x64.exe
          - os: ubuntu-latest
            script: dist:linux
            arch: x64
            artifact: professor-domino-linux
            installer: Professor-Domino-linux-x86_64.AppImage
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run ${{ matrix.script }} -- --${{ matrix.arch }} --publish never
      - name: Stage installer
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifact
          test -f "dist/${{ matrix.installer }}"
          cp "dist/${{ matrix.installer }}" artifact/
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: artifact/${{ matrix.installer }}
          if-no-files-found: error

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - name: Install Gradle
        run: |
          curl -L https://services.gradle.org/distributions/gradle-8.9-bin.zip -o gradle.zip
          unzip -q gradle.zip
          echo "$PWD/gradle-8.9/bin" >> "$GITHUB_PATH"
      - name: Build installable APK
        run: gradle -p android-app :app:assembleDebug
      - name: Prepare APK
        run: |
          mkdir -p android-dist
          cp android-app/app/build/outputs/apk/debug/app-debug.apk android-dist/Professor-Domino-android.apk
      - uses: actions/upload-artifact@v4
        with:
          name: professor-domino-android
          path: android-dist/Professor-Domino-android.apk
          if-no-files-found: error

  publish:
    if: github.event_name == 'workflow_dispatch'
    needs: [desktop, android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: release-files
          merge-multiple: true
      - name: Verify release assets
        run: |
          set -euo pipefail
          required=(
            "Professor-Domino-android.apk"
            "Professor-Domino-mac-arm64.dmg"
            "Professor-Domino-win-x64.exe"
            "Professor-Domino-linux-x86_64.AppImage"
          )
          for file in "${required[@]}"; do
            test -f "release-files/$file" || {
              echo "Missing required release asset: $file"
              find release-files -maxdepth 2 -type f -print
              exit 1
            }
          done
          find release-files -mindepth 1 -maxdepth 1 -type d -print -quit | grep -q . && {
            echo "Release files must be flat files, not directories:"
            find release-files -mindepth 1 -maxdepth 1 -type d -print
            exit 1
          }
          find release-files -mindepth 1 -maxdepth 1 -type f \
            ! -name "Professor-Domino-android.apk" \
            ! -name "Professor-Domino-mac-arm64.dmg" \
            ! -name "Professor-Domino-win-x64.exe" \
            ! -name "Professor-Domino-linux-x86_64.AppImage" \
            -print -quit | grep -q . && {
              echo "Unexpected release asset:"
              find release-files -mindepth 1 -maxdepth 1 -type f \
                ! -name "Professor-Domino-android.apk" \
                ! -name "Professor-Domino-mac-arm64.dmg" \
                ! -name "Professor-Domino-win-x64.exe" \
                ! -name "Professor-Domino-linux-x86_64.AppImage" \
                -print
              exit 1
            }
      - name: Publish complete release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}
          RELEASE_TITLE: ${{ github.event.inputs.release_title }}
        run: |
          set -euo pipefail
          title="${RELEASE_TITLE:-Professor Domino $RELEASE_TAG}"
          notes="$(cat <<'NOTES'
          Professor Domino phone and desktop release.

          Downloads:
          - Android: Professor-Domino-android.apk
          - macOS: Professor-Domino-mac-arm64.dmg
          - Windows: Professor-Domino-win-x64.exe
          - Linux: Professor-Domino-linux-x86_64.AppImage

          Android can float Domino over other apps after the user allows screen overlay permission. These apps are currently unsigned/debug-signed, so Android, macOS, and Windows may show security warnings during install.
          NOTES
          )"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" \
              release-files/Professor-Domino-android.apk \
              release-files/Professor-Domino-mac-arm64.dmg \
              release-files/Professor-Domino-win-x64.exe \
              release-files/Professor-Domino-linux-x86_64.AppImage \
              --clobber
            gh release edit "$RELEASE_TAG" --title "$title" --notes "$notes" --latest
          else
            gh release create "$RELEASE_TAG" \
              release-files/Professor-Domino-android.apk \
              release-files/Professor-Domino-mac-arm64.dmg \
              release-files/Professor-Domino-win-x64.exe \
              release-files/Professor-Domino-linux-x86_64.AppImage \
              --target "$GITHUB_SHA" --title "$title" --notes "$notes" --latest
          fi

          gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name' > uploaded-assets.txt
          for file in Professor-Domino-android.apk Professor-Domino-mac-arm64.dmg Professor-Domino-win-x64.exe Professor-Domino-linux-x86_64.AppImage; do
            grep -Fx "$file" uploaded-assets.txt
          done
