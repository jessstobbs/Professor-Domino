name: Build Professor Domino

on:
  push:
    branches: [main]
  release:
    types: [created, published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            script: dist:mac
          - os: windows-latest
            script: dist:win
          - os: ubuntu-latest
            script: dist:linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run ${{ matrix.script }} -- --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: professor-domino-${{ matrix.os }}
          path: dist/*
      - name: Upload installers to release
        if: github.event_name == 'release'
        run: gh release upload "${{ github.event.release.tag_name }}" dist/*.* --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
