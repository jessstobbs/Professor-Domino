name: Build Professor Domino Android

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional release tag to upload Professor-Domino-android.apk to"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - name: Install Gradle
        run: |
          curl -L https://services.gradle.org/distributions/gradle-8.9-bin.zip -o gradle.zip
          unzip -q gradle.zip
          echo "$PWD/gradle-8.9/bin" >> "$GITHUB_PATH"
      - name: Build installable APK
        run: gradle -p android-app :app:assembleDebug
      - name: Prepare APK
        run: |
          mkdir -p android-dist
          cp android-app/app/build/outputs/apk/debug/app-debug.apk android-dist/Professor-Domino-android.apk
      - uses: actions/upload-artifact@v4
        with:
          name: professor-domino-android
          path: android-dist/Professor-Domino-android.apk
      - name: Upload APK to release
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != ''
        run: gh release upload "${{ github.event.inputs.release_tag }}" android-dist/Professor-Domino-android.apk --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
